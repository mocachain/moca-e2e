name: Test Stack

on:
  pull_request:
    branches: [main]
    paths:
      - 'stack.yaml'
      - 'scripts/**'
      - 'tests/**'
      - 'docker/**'
      - 'topology/**'

  workflow_dispatch:
    inputs:
      topology:
        description: 'Topology to test'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - minimal

permissions:
  contents: read

concurrency:
  group: e2e-test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      TOPOLOGY: topology/${{ github.event.inputs.topology || 'default' }}.yaml

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${{ matrix.arch }}
          sudo chmod +x /usr/local/bin/yq

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh
          chmod +x tests/*.sh

      - name: Clone repos at stack.yaml refs
        run: ./scripts/clone-repos.sh stack.yaml
        env:
          GH_TOKEN: ${{ secrets.E2E_HUB_PAT }}

      - name: Generate docker-compose
        run: ./scripts/generate-compose.sh "$TOPOLOGY" docker-compose.generated.yml

      - name: Build images
        run: ./scripts/build.sh local

      - name: Start services
        run: |
          docker compose -f docker-compose.generated.yml up -d
          ./scripts/wait-for-chain.sh http://localhost:26657 5 180

      - name: Run E2E tests
        run: ./scripts/run-suite.sh local config/local.yaml

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p test-results/logs
          docker compose -f docker-compose.generated.yml logs > test-results/logs/all-${{ matrix.arch }}.log 2>&1 || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.arch }}
          path: test-results/
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.generated.yml down -v --remove-orphans --timeout 30 || true
