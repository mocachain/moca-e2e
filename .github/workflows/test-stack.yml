name: Test Stack

on:
  pull_request:
    branches: [main]
    paths:
      - 'stack.yaml'
      - 'scripts/**'
      - 'tests/**'
      - 'docker/**'
      - 'topology/**'

  workflow_dispatch:
    inputs:
      topology:
        description: 'Topology to test'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - minimal

permissions:
  contents: read

concurrency:
  group: e2e-test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      TOPOLOGY: topology/${{ github.event.inputs.topology || 'default' }}.yaml

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${{ matrix.arch }}
          sudo chmod +x /usr/local/bin/yq

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh
          chmod +x tests/*.sh

      - name: Clone repos at stack.yaml refs
        run: ./scripts/clone-repos.sh stack.yaml
        env:
          GH_TOKEN: ${{ secrets.E2E_HUB_PAT }}

      - name: Generate docker-compose
        run: ./scripts/generate-compose.sh "$TOPOLOGY" docker-compose.generated.yml

      - name: Build images
        run: ./scripts/build.sh local
        env:
          GH_TOKEN: ${{ secrets.E2E_HUB_PAT }}

      - name: Start services
        run: |
          # Start in stages: init → validators → wait → SPs
          docker compose -f docker-compose.generated.yml up genesis-init 2>&1 | tail -5
          docker compose -f docker-compose.generated.yml up -d --no-deps mysql $(docker compose -f docker-compose.generated.yml config --services | grep validator)
          ./scripts/wait-for-chain.sh http://localhost:26657 5 300
          docker compose -f docker-compose.generated.yml up -d --no-deps $(docker compose -f docker-compose.generated.yml config --services | grep sp-) || true

      - name: Run E2E tests
        run: ./scripts/run-suite.sh local config/local.yaml

      - name: Collect logs
        if: always()
        run: |
          mkdir -p test-results/logs
          COMPOSE="docker compose -f docker-compose.generated.yml"

          # Per-service logs
          for svc in $($COMPOSE config --services 2>/dev/null); do
            $COMPOSE logs "$svc" > "test-results/logs/${svc}.log" 2>&1 || true
          done

          # Combined log
          $COMPOSE logs > test-results/logs/all.log 2>&1 || true

          # Container status
          $COMPOSE ps -a > test-results/logs/containers.txt 2>&1 || true

          # Grep for critical errors across all logs
          echo "=== Critical errors ===" | tee test-results/logs/errors-summary.txt
          grep -ihE "ERR|panic|CONSENSUS FAILURE|validator set is empty|invalid chain-id|fatal" \
            test-results/logs/*.log 2>/dev/null \
            | grep -v "log_level" \
            | sort -u \
            | tee -a test-results/logs/errors-summary.txt || echo "No critical errors found"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.arch }}
          path: test-results/
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.generated.yml down -v --remove-orphans --timeout 30 || true
